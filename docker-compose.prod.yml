services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wa_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wa_pass}
      POSTGRES_DB: wa_marketing
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U wa_user -d wa_marketing']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 512M
    networks:
      - backend_net

  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      DATABASE_URL: postgresql://wa_user:${POSTGRES_PASSWORD:-wa_pass}@postgres:5432/wa_marketing
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h 127.0.0.1 -p 5432']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend_net

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-redis_pass}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - backend_net

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://wa_user:${POSTGRES_PASSWORD:-wa_pass}@pgbouncer:5432/wa_marketing
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-in-production-refresh}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      SESSION_MANAGER_URL: http://session-manager:3002
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    post_start:
      - command: /bin/sh -c "npm run migration:run:prod && npm run seed:prod"
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/api/v1/health']
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 15s
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        max_attempts: 3
      resources:
        limits:
          memory: 512M
    networks:
      - backend_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        BACKEND_URL: http://backend:3001
        SESSION_MANAGER_URL: http://session-manager:3002
    environment:
      NODE_ENV: production
      BACKEND_URL: http://backend:3001
      SESSION_MANAGER_URL: http://session-manager:3002
    depends_on:
      - backend
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
    networks:
      - frontend_net

  session-manager:
    build:
      context: ./session-manager
      dockerfile: Dockerfile
      target: production
    environment:
      NODE_ENV: production
      PORT: 3002
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379
      SESSION_DATA_PATH: /data/sessions
    volumes:
      - session_data:/data/sessions
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 512M
    networks:
      - backend_net

  documentation:
    build:
      context: ./documentation
      dockerfile: Dockerfile
      target: production
    environment:
      NODE_ENV: production
    depends_on:
      - frontend
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 256M
    networks:
      - frontend_net

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 256M
    networks:
      - backend_net

  grafana:
    image: grafana/grafana:latest
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 256M
    networks:
      - backend_net

  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
      - documentation
    deploy:
      replicas: 1
    networks:
      - frontend_net
      - backend_net

volumes:
  pgdata:
  redisdata:
  miniodata:
  session_data:
  prometheus_data:
  grafana_data:

# Use 'overlay' for Docker Swarm deployments, 'bridge' for docker-compose.
# Switch to overlay + internal when deploying with: docker stack deploy
networks:
  backend_net:
    driver: bridge
    # For Swarm: driver: overlay, internal: true
  frontend_net:
    driver: bridge
    # For Swarm: driver: overlay

# Uncomment for Docker Swarm secret management:
# secrets:
#   db_password:
#     external: true
#   jwt_secret:
#     external: true
#   minio_secret_key:
#     external: true
#   redis_password:
#     external: true
