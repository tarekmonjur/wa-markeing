name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # Stage 1: Lint & Test
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: wa_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: wa_marketing_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wa_user"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Lint
        working-directory: backend
        run: npm run lint

      - name: TypeScript check
        working-directory: backend
        run: npx tsc --noEmit

      - name: Unit tests
        working-directory: backend
        run: npm run test -- --coverage
        env:
          NODE_ENV: test

      - name: Run migrations
        working-directory: backend
        run: npx typeorm migration:run -d dist/database/data-source.js
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://wa_user:test_pass@localhost:5432/wa_marketing_test

      - name: Verify no pending migrations
        working-directory: backend
        run: npx typeorm migration:show -d dist/database/data-source.js
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://wa_user:test_pass@localhost:5432/wa_marketing_test

      - name: E2E tests
        working-directory: backend
        run: npm run test:e2e
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://wa_user:test_pass@localhost:5432/wa_marketing_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: e2e-test-secret-that-is-at-least-32-chars
          MINIO_ENDPOINT: localhost
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          FRONTEND_URL: http://localhost:3000

  # Stage 2: Build Docker images
  build:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend, frontend, session-manager]

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest

  # Stage 3: Deploy (main branch only)
  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Swarm
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/wa-marketing
            export TAG=${{ github.sha }}
            docker stack deploy --with-registry-auth -c docker-compose.prod.yml wa-marketing
            echo "Deployed $TAG"
            # Watch rollout
            docker service ps wa-marketing_backend --no-trunc
