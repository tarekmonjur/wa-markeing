services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wa_user
      POSTGRES_PASSWORD: wa_pass
      POSTGRES_DB: wa_marketing
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U wa_user -d wa_marketing']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - miniodata:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 3s
      retries: 5

  # Create the default MinIO bucket on startup
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/wa-media --ignore-existing;
      echo 'MinIO bucket wa-media ready';
      "
    restart: 'no'

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    ports:
      - '3001:3001'
    volumes:
      - ./backend/src:/app/src
      - /app/node_modules
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://wa_user:wa_pass@postgres:5432/wa_marketing
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change-me-to-a-very-long-secret-at-least-32-chars
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: wa-media
      MINIO_USE_SSL: 'false'
      SESSION_FILES_PATH: /data/sessions
      FRONTEND_URL: http://localhost:3000
      SESSION_MANAGER_URL: http://session-manager:3002
    command: ['npm', 'run', 'dev']
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    post_start:
      - command: /bin/sh -c "npm run migration:run"
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/api/v1/health']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    ports:
      - '3000:3000'
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - /app/node_modules
      - /app/.next
    environment:
      BACKEND_URL: http://backend:3001
      SESSION_MANAGER_URL: http://session-manager:3002
      NEXT_TELEMETRY_DISABLED: 1
    command: ['npm', 'run', 'dev']
    depends_on:
      backend:
        condition: service_healthy

  session-manager:
    build:
      context: ./session-manager
      dockerfile: Dockerfile
      target: dev
    ports:
      - '3002:3002'
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ./session-manager/src:/app/src
      - session-data:/data/sessions
      - /app/node_modules
    environment:
      SESSION_MANAGER_PORT: 3002
      REDIS_URL: redis://redis:6379
      SESSION_FILES_PATH: /data/sessions
      LOG_LEVEL: debug
    command: ['npm', 'run', 'dev']
    depends_on:
      redis:
        condition: service_healthy

  ollama:
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - '11434:11434'

volumes:
  pgdata:
  redisdata:
  miniodata:
  session-data:
  ollama_data:
